<div class="flex w-full mb-1 transition-all" [ngClass]="layoutClass()">
  <div class="relative max-w-[85%] group flex flex-col">
    @if (isGroup() && !isMine() && !isSystem()) {
      <span
        class="text-[10px] text-gray-500 ml-1 mb-0.5 font-medium select-none"
      >
        {{ message().senderId | contactName }}
      </span>
    }

    <chat-message-bubble
      [direction]="direction()"
      [timestamp]="message().sentTimestamp"
      [status]="message().status"
      [isBroadcast]="isBroadcast()"
      [isGhost]="isGhost()"
      [isSystem]="isSystem()"
      [statusTooltip]="statusTooltip()"
      [themeColor]="bubbleColor()"
    >
      <chat-message-renderer
        [message]="message()"
        [isMine]="isMine()"
        (action)="action.emit($event)"
        (acceptInvite)="acceptInvite.emit($event)"
        (rejectInvite)="rejectInvite.emit($event)"
      />
    </chat-message-bubble>

    @if (readCursors().length > 0) {
      <div
        class="absolute top-full z-10 cursor-container flex space-x-1 mt-1"
        [class.right-0]="isMine()"
        [class.left-0]="!isMine()"
      >
        @for (urn of readCursors(); track urn.toString()) {
          <div
            class="cursor-avatar"
            [matTooltip]="'' + (urn | contactName)"
            matTooltipPosition="below"
          >
            <div
              class="w-4 h-4 rounded-full bg-blue-500 text-[8px] text-white flex items-center justify-center border border-white ring-1 ring-blue-100"
            >
              {{ (urn | contactName).slice(0, 1) }}
            </div>
          </div>
        }
      </div>
    }
  </div>
</div>
