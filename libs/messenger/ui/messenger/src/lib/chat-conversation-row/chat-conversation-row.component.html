<div class="flex w-full mb-1 transition-all" [ngClass]="layoutClass()">
  <div class="relative max-w-[85%] group">
    <chat-message-bubble
      [direction]="direction()"
      [timestamp]="message().sentTimestamp"
      [status]="message().status"
      [isBroadcast]="isBroadcast()"
      [isGhost]="isGhost()"
      [isSystem]="isSystem()"
      [statusTooltip]="statusTooltip()"
    >
      <chat-message-renderer
        [message]="message()"
        [isMine]="isMine()"
        (action)="action.emit($event)"
        (acceptInvite)="acceptInvite.emit($event)"
        (rejectInvite)="rejectInvite.emit($event)"
      />
    </chat-message-bubble>

    @if (readCursors().length > 0) {
      <div
        class="absolute top-0 z-10 cursor-container flex flex-col space-y-1"
        [class.right-full]="isMine()"
        [class.mr-2]="isMine()"
        [class.left-full]="!isMine()"
        [class.ml-2]="!isMine()"
      >
        @for (urn of readCursors(); track urn.toString()) {
          <div
            class="cursor-avatar looking-right"
            [matTooltip]="'' + (urn | contactName)"
            matTooltipPosition="above"
          >
            👀
          </div>
        }
      </div>
    }
  </div>
</div>
