<div class="flex flex-col h-full bg-white">
  <messenger-chat-window-header
    [title]="title()"
    [icon]="headerData()"
    [hasKeyIssue]="isKeyMissing()"
    [groupType]="groupType()"
    (back)="onHeaderBack()"
    (toggleInfo)="onToggleInfo()"
    (fork)="onHeaderFork()"
    (broadcast)="onHeaderBroadcast()"
  />

  <div class="flex-grow overflow-hidden relative">
    @switch (viewState()) {
      @case ('SHOW_LOADING') {
        <div
          class="absolute inset-0 flex items-center justify-center bg-white z-50"
        >
          <mat-spinner diameter="40" class="opacity-50"></mat-spinner>
        </div>
      }

      @case ('SHOW_INTRO') {
        <messenger-chat-group-intro
          [groupName]="headerData()?.name || 'Group'"
          [memberCount]="activeLocalGroup()?.memberUrns?.length || 0"
          (startBroadcast)="onStartBroadcast()"
          (createGroupChat)="onCreateGroupChat()"
        />
      }

      @case ('SHOW_BLOCKED') {
        <div>blocked</div>
        >
      }

      @case ('SHOW_ROUTER_OUTLET') {
        <router-outlet></router-outlet>
      }
    }
  </div>
</div>
