<header
  class="flex-shrink-0 flex items-center layout-header h-16 px-4 bg-white border-b border-gray-200"
>
  <button
    type="button"
    mat-icon-button
    (click)="back.emit()"
    class="mr-2 text-gray-600"
    aria-label="Back"
  >
    <mat-icon>arrow_back</mat-icon>
  </button>

  <div
    role="img"
    title="profile listing"
    class="relative flex h-10 w-10 items-center justify-center rounded-full overflow-hidden bg-gray-600 text-white flex-shrink-0"
  >
    @if (icon()?.pictureUrl) {
      <img
        alt="profile picture"
        [src]="icon()?.pictureUrl"
        class="h-full w-full object-cover"
      />
    } @else {
      <span data-testid="initials" class="text-base font-medium">
        {{ initials() }}
      </span>
    }
  </div>

  <div class="ml-3 flex-grow min-w-0 flex flex-col justify-center">
    <div class="font-medium text-gray-900 truncate leading-tight">
      {{ title() }}
    </div>
    @if (groupType() === 'network') {
      <div class="text-xs text-purple-600 font-medium flex items-center gap-1">
        <mat-icon class="text-[10px] w-3 h-3">hub</mat-icon>
        Network Group
      </div>
    }
  </div>

  @if (mode() === 'chat') {
    <div class="flex items-center gap-1">
      @if (groupType() === 'network') {
        <button
          type="button"
          mat-icon-button
          (click)="broadcast.emit()"
          matTooltip="Broadcast to Members"
          class="text-gray-500 hover:text-orange-600"
        >
          <mat-icon>campaign</mat-icon>
        </button>
      }

      @if (groupType()) {
        <button
          type="button"
          mat-icon-button
          (click)="fork.emit()"
          matTooltip="Use as Template"
          class="text-gray-500 hover:text-purple-600"
        >
          <mat-icon>add_circle_outline</mat-icon>
        </button>
      }

      <button
        type="button"
        mat-icon-button
        (click)="toggleInfo.emit()"
        matTooltip="Info"
        class="text-gray-500"
      >
        <mat-icon>info_outline</mat-icon>
      </button>
    </div>
  }
</header>
