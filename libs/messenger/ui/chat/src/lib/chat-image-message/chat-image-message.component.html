<div
  class="image-bubble-container group relative"
  [style.aspect-ratio]="aspectRatio()"
  [matBadge]="'HD'"
  [matBadgeHidden]="!showHdBadge()"
  matBadgePosition="above after"
  matBadgeSize="medium"
  matBadgeColor="accent"
>
  <img
    [src]="displaySrc() | safeUrl"
    alt="attachment"
    class="chat-bubble-image"
    loading="lazy"
    (click)="openPreview()"
  />

  @if (mediaLinks()) {
    <div
      class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-3 backdrop-blur-[2px] z-10 cursor-pointer"
      (click)="openPreview()"
    >
      <div class="flex gap-2">
        <button
          mat-icon-button
          class="!text-white bg-white/20 hover:bg-white/30 scale-90"
          title="Quick View"
        >
          <mat-icon>visibility</mat-icon>
        </button>

        @if (capabilities().canLinkExternal) {
          <button
            mat-icon-button
            class="!text-white bg-white/20 hover:bg-white/30 scale-90"
            (click)="$event.stopPropagation(); openExternal()"
            title="Open in Drive"
          >
            <mat-icon>open_in_new</mat-icon>
          </button>
        }
      </div>

      @if (capabilities().canDownload && !isHd()) {
        <button
          type="button"
          (click)="$event.stopPropagation(); updateThumbnail()"
          [disabled]="isUpdatingThumbnail()"
          class="text-[10px] flex items-center gap-1 px-3 py-1.5 rounded-full bg-white/20 hover:bg-white/30 text-white font-medium backdrop-blur-md transition-all border border-white/10"
        >
          @if (isUpdatingThumbnail()) {
            <mat-icon class="!w-3 !h-3 text-[10px] leading-3 animate-spin"
              >sync</mat-icon
            >
            <span>Saving...</span>
          } @else {
            <mat-icon class="!w-3 !h-3 text-[10px] leading-3"
              >save_alt</mat-icon
            >
            <span>Store Inline</span>
          }
        </button>
      }
    </div>
  }

  @if (parts().length > 0) {
    <div
      class="absolute bottom-0 w-full bg-black/60 text-white text-xs p-2 backdrop-blur-md pointer-events-none z-20"
    >
      <chat-text-renderer [parts]="parts()" />
    </div>
  }
</div>

@if (isLightboxOpen()) {
  <div class="fixed inset-0 z-50 flex flex-col bg-black/95 animate-fade-in">
    <div class="flex items-center justify-between p-4 text-white z-50">
      <div class="flex items-center gap-2">
        <button mat-icon-button (click)="closePreview()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <div class="flex items-center gap-2">
        @if (capabilities().canDownload) {
          <button mat-icon-button (click)="downloadOriginal($event)">
            <mat-icon>download</mat-icon>
          </button>
        }
      </div>
    </div>

    <div class="flex-grow relative flex items-center justify-center p-4">
      @if (isLoadingPreview()) {
        <mat-spinner diameter="48" color="accent"></mat-spinner>
      }

      @if (activePreviewUrl()) {
        <img
          [src]="activePreviewUrl() | safeUrl"
          alt="preview"
          class="max-h-full max-w-full object-contain shadow-2xl animate-scale-in"
        />
      } @else if (!isLoadingPreview()) {
        <img
          [src]="displaySrc() | safeUrl"
          alt="preview-blur"
          class="max-h-full max-w-full object-contain blur-md opacity-50"
        />
      }
    </div>
  </div>
}
