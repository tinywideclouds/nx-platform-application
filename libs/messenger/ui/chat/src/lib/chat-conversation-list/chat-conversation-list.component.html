<div class="flex flex-col h-full">
  @if (items().length > 0) {
    @for (item of items(); track item.id.toString()) {
      <chat-conversation-list-item [item]="item" (select)="onSelect(item)" />
    }
  } @else {
    <div
      class="flex flex-col items-center justify-center h-32 text-gray-400"
      data-testid="empty-conversation-list"
    >
      <p>No conversations found.</p>
    </div>
  }
</div>
