// Defines the message contract for the LLM service.
syntax = "proto3";

package src.types.builder.v1;
option go_package = "github.com/tinywideclouds/gen-llm/go/types/builder/v1;builder_v1";

// Shared wire format for both inline attachments and data source pointers
message NetworkAttachmentPb {
  string id = 1;
  string data_source_id = 2; 
  optional string profile_id = 3;
}

message BuildCacheRequestPb {
  string model = 1;
  repeated NetworkAttachmentPb sources = 2; 
  optional string expires_at_hint = 3;
}

message BuildCacheResponsePb {
  string compiled_cache_id = 1;
  string expires_at = 2;
}

message NetworkMessagePb {
  string id = 1;
  string role = 2;
  string content = 3;
  string timestamp = 4;
}

message GenerateStreamRequestPb {
  string session_id = 1;
  string model = 2;
  repeated NetworkMessagePb history = 3;
  optional string compiled_cache_id = 4;
  repeated NetworkAttachmentPb inline_attachments = 5;
}

message FileStatePb {
  string content = 1;
  bool is_deleted = 2;
}

message ChangeProposalPb {
  string id = 1;
  string file_path = 2;
  optional string patch = 3;
  optional string new_content = 4; 
  string reasoning = 5;
  string created_at = 6; 
  string session_id = 7;
}

message CompiledCachePb {
  string id = 1;
  string provider = 2;    
  repeated NetworkAttachmentPb sources = 3; 
  string created_at = 4;
  string expires_at = 5;
}

message SessionPb {
  string id = 1;
  string compiled_cache_id = 2;
  string updated_at = 3;
}