<div class="h-full flex flex-col bg-white">
  <div
    class="z-10 relative bg-white shadow-sm border-b border-gray-200 px-4 py-3 flex justify-between items-center"
  >
    <div class="flex items-center gap-1">
      <button type="button" (click)="onClose()" class="text-gray-600 mr-1">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <h2 class="font-bold text-gray-800 text-base flex items-center gap-2">
        <mat-icon class="text-gray-400">tune</mat-icon>
        Session Details
      </h2>
    </div>

    <div class="flex items-center gap-2">
      @if (isEditMode()) {
        <button type="button" mat-button (click)="onCancel()">Cancel</button>
        <button
          type="button"
          mat-flat-button
          [color]="formErrorCount() > 0 ? 'warn' : 'primary'"
          (click)="triggerFormSave()"
        >
          @if (formErrorCount() > 0) {
            Fill ({{ formErrorCount() }})
          } @else {
            Save
          }
        </button>
      } @else {
        <button type="button" mat-stroked-button (click)="enableEditMode()">
          Edit
        </button>
      }
    </div>
  </div>

  <div class="flex-grow overflow-y-auto flex justify-center">
    @if (session(); as data) {
      <div class="w-full max-w-5xl px-6 py-8 pb-20">
        <llm-session-form
          [session]="data"
          [isEditing]="isEditMode()"
          (errorsChange)="formErrorCount.set($event)"
          (save)="onSave($event)"
          (requestEdit)="enableEditMode()"
          (delete)="onDelete()"
        />
      </div>
    } @else {
      <div class="p-8 text-center text-gray-500 animate-pulse">
        Loading session details...
      </div>
    }
  </div>
</div>
