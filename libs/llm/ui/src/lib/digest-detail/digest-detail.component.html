<div class="flex flex-col h-full bg-white relative overflow-hidden">
  @if (activeDigest(); as digest) {
    <div
      class="p-4 border-b border-gray-200 bg-slate-50 flex items-center justify-between shrink-0 z-20"
    >
      <div class="flex items-center gap-4">
        <div
          class="flex items-center bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden"
        >
          <button
            mat-icon-button
            class="rounded-none w-10 h-10 flex items-center justify-center hover:bg-gray-50 disabled:opacity-30 disabled:hover:bg-transparent transition-colors"
            [disabled]="!prevDigest()"
            (click)="goToPrev()"
            matTooltip="Previous Digest"
          >
            <mat-icon class="scale-90 m-0">chevron_left</mat-icon>
          </button>
          <div class="w-px h-6 bg-gray-200"></div>
          <button
            mat-icon-button
            class="rounded-none w-10 h-10 flex items-center justify-center hover:bg-gray-50 disabled:opacity-30 disabled:hover:bg-transparent transition-colors"
            [disabled]="!nextDigest()"
            (click)="goToNext()"
            matTooltip="Next Digest"
          >
            <mat-icon class="scale-90 m-0">chevron_right</mat-icon>
          </button>
        </div>

        <div>
          <h2
            class="text-lg font-bold text-gray-800 m-0 flex items-center gap-2"
          >
            <mat-icon class="text-indigo-500">receipt_long</mat-icon> Session
            Digest
          </h2>
          <p class="text-sm text-gray-500 m-0 mt-1">
            Covers {{ digest.startTime | date: 'MMM d, h:mm a' }} &mdash;
            {{ digest.endTime | date: 'shortTime' }}
          </p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        @if (isEditing()) {
          <button mat-button (click)="toggleEdit()">Cancel</button>
          <button mat-flat-button color="primary" (click)="saveEdit()">
            <mat-icon class="scale-75 -ml-1">save</mat-icon> Save Changes
          </button>
        } @else {
          <button mat-stroked-button class="bg-white" (click)="toggleEdit()">
            <mat-icon class="scale-75 -ml-1 text-gray-500">edit</mat-icon> Edit
            Digest
          </button>
        }

        <div class="h-6 w-px bg-gray-300 mx-1"></div>
        <button
          mat-icon-button
          (click)="isSidebarOpen.set(!isSidebarOpen())"
          matTooltip="Toggle Metadata Info"
          class="text-gray-500 hover:text-indigo-600 transition-colors"
        >
          <mat-icon>{{
            isSidebarOpen() ? 'right_panel_close' : 'right_panel_open'
          }}</mat-icon>
        </button>
      </div>
    </div>

    <div class="flex-1 flex flex-row min-h-0 relative">
      <div
        class="flex-1 overflow-y-auto p-8 bg-white"
        [class.animate-pulse-once]="digest.id"
      >
        <div class="max-w-3xl mx-auto pb-12 transition-opacity duration-300">
          @if (isEditing()) {
            <textarea
              [(ngModel)]="editedContent"
              class="w-full h-[60vh] p-4 border border-indigo-300 rounded-lg shadow-inner font-mono text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y"
              placeholder="Edit your digest markdown here..."
            ></textarea>
          } @else {
            <scrollspace-markdown-bubble
              [itemId]="digest.id.toString()"
              [tokens]="digest.content | markdownTokens"
            />
          }
        </div>
      </div>

      @if (isSidebarOpen()) {
        <div
          class="w-80 shrink-0 border-l border-gray-200 bg-slate-50 overflow-y-auto z-20"
        >
          <llm-digest-detail-info
            class="block p-6"
            [digest]="digest"
            (viewContext)="openContextPreview()"
          />
        </div>
      }
    </div>
  }
</div>
