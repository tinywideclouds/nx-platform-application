<div
  class="flex flex-col h-full max-h-[600px] bg-white border border-gray-200 rounded-lg overflow-hidden flex-shrink-0"
>
  <div
    class="px-4 py-3 bg-gray-50 border-b border-gray-200 flex justify-between items-center text-sm"
  >
    <span class="font-medium text-gray-700"
      >{{ files().length }} files ingested</span
    >
    <span class="text-gray-500">{{ formatBytes(totalSize()) }} total</span>
  </div>

  <div class="flex-grow overflow-y-auto p-2">
    @if (files().length === 0) {
      <div class="p-8 text-center text-gray-500 text-sm">
        No files found in this repository cache.
      </div>
    } @else {
      <ul class="flex flex-col">
        @for (file of files(); track file.path) {
          <li
            class="flex items-center gap-3 px-3 py-2 hover:bg-gray-50 rounded-md transition-colors group"
          >
            <mat-icon class="text-gray-400 scale-75 flex-shrink-0"
              >insert_drive_file</mat-icon
            >
            <div class="flex flex-col overflow-hidden">
              <span class="text-sm text-gray-800 truncate" [title]="file.path">
                {{ file.path }}
              </span>
              <span class="text-[10px] text-gray-400 font-mono">
                {{ formatBytes(file.sizeBytes) }}
              </span>
            </div>

            <div
              class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity"
            >
              <span
                class="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded border border-green-200"
              >
                Indexed
              </span>
            </div>
          </li>
        }
      </ul>
    }
  </div>
</div>
