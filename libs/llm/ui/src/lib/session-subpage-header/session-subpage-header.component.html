<div
  class="z-10 relative bg-white shadow-sm border-b border-gray-200 px-4 py-3 flex items-center justify-between"
>
  <div class="flex items-center">
    <button
      type="button"
      (click)="closed.emit()"
      class="text-gray-600 mr-2 hover:bg-gray-100 rounded-full p-1 transition-colors shrink-0"
    >
      <mat-icon>arrow_back</mat-icon>
    </button>

    <div class="flex flex-col justify-center">
      <span class="font-bold text-gray-800 text-base leading-tight">
        {{ sessionTitle() }} Chat
      </span>
    </div>
  </div>

  <div class="flex flex-col justify-center">
    <h3
      class="font-bold text-gray-800 text-base flex items-center gap-2 m-0 leading-tight"
    >
      <mat-icon [class]="iconColor()">{{ icon() }}</mat-icon>
      {{ title() }}
    </h3>
  </div>

  <div class="flex items-center gap-2">
    <ng-content select="[actions]"></ng-content>
  </div>
</div>
