<div class="absolute top-0 left-0 w-full z-40 pointer-events-none">
  <div
    class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 max-w-2xl bg-slate-800/95 backdrop-blur-md text-slate-300 font-mono text-xs overflow-hidden transition-all duration-300 origin-top rounded-b-xl shadow-lg pointer-events-auto border-x border-b border-slate-700"
    [class.max-h-0]="!showThoughts()"
    [class.max-h-64]="showThoughts()"
    [class.opacity-0]="!showThoughts()"
    [class.py-0]="!showThoughts()"
    [class.py-3]="showThoughts()"
  >
    <div
      class="px-4 overflow-y-auto max-h-56 whitespace-pre-wrap flex flex-col-reverse"
    >
      {{ activeThought() || 'Waiting for the model to begin reasoning...' }}
    </div>
  </div>

  <div class="absolute top-3 right-3 flex flex-col items-end gap-2">
    <div class="pointer-events-auto flex items-center gap-2">
      @if (alertState().alert) {
        <mat-icon
          class="text-amber-500 animate-pulse cursor-pointer scale-90 m-0 bg-white/95 backdrop-blur-md border border-gray-200 p-1 rounded-full shadow-sm"
          [matTooltip]="alertState().reason"
          (click)="openDetails.emit()"
        >
          notifications_active
        </mat-icon>
      }

      <div
        class="bg-white/95 backdrop-blur-md border border-gray-200 p-1 h-[36px] rounded-xl shadow-sm flex items-center transition-all box-border"
      >
        @if (isSelectionMode()) {
          <span
            class="text-xs text-gray-500 font-medium ml-3 mr-2 animate-fade-in"
          >
            {{ selectedCount() }} selected
          </span>
          <div class="w-px h-4 bg-gray-300 mx-1"></div>
          <button
            type="button"
            (click)="toggleSelection.emit()"
            class="text-xs font-semibold text-gray-600 hover:text-gray-900 px-3 py-1 rounded-md transition-colors"
          >
            Cancel
          </button>
        } @else {
          <button
            type="button"
            (click)="toggleSelection.emit()"
            class="flex items-center gap-1 text-xs font-semibold text-blue-600 hover:text-blue-800 px-3 py-0.5 rounded-lg transition-colors cursor-pointer"
          >
            <mat-icon class="scale-75 -mx-1">checklist</mat-icon> Select Context
          </button>
        }
      </div>

      <div
        (click)="toggleThoughts()"
        class="px-3 h-[36px] rounded-xl bg-white/95 backdrop-blur-md border border-gray-200 text-xs font-semibold text-gray-700 cursor-pointer hover:bg-white transition-colors flex items-center gap-2 shadow-sm box-border"
        [class.animate-pulse]="isThinking()"
        matTooltip="Click to view reasoning"
      >
        <div
          class="w-2 h-2 rounded-full"
          [ngClass]="isThinking() ? 'bg-amber-500' : 'bg-indigo-500'"
        ></div>
        {{ primaryModelLabel() }}

        @if (overrideRemaining() !== null) {
          <span
            class="ml-1 flex items-center justify-center bg-indigo-100 text-indigo-800 rounded-full w-4 h-4 text-[9px] font-black"
          >
            {{ overrideRemaining() }}
          </span>
        }
      </div>
    </div>

    <div
      class="pointer-events-auto overflow-hidden transition-all duration-300 ease-in-out origin-top"
      [class.max-h-0]="!isSelectionMode()"
      [class.max-h-16]="isSelectionMode()"
      [class.opacity-0]="!isSelectionMode()"
      [class.opacity-100]="isSelectionMode()"
    >
      <div
        class="bg-white/95 backdrop-blur-md border border-gray-200 p-1 h-[36px] rounded-xl shadow-sm flex items-center box-border gap-1"
      >
        <button
          type="button"
          (click)="editContext.emit()"
          [disabled]="selectedCount() !== 1"
          class="text-xs font-semibold text-gray-600 hover:text-gray-900 px-3 py-1 rounded-md transition-colors disabled:opacity-50"
        >
          Edit
        </button>
        <button
          type="button"
          (click)="excludeContext.emit()"
          [disabled]="selectedCount() === 0"
          class="text-xs font-semibold text-gray-600 hover:text-gray-900 px-3 py-1 rounded-md transition-colors disabled:opacity-50"
        >
          Exclude
        </button>
        <button
          type="button"
          (click)="groupContext.emit()"
          [disabled]="selectedCount() === 0"
          class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 px-3 py-1 rounded-md transition-colors disabled:opacity-50"
        >
          Group
        </button>
        <button
          type="button"
          (click)="confirmDelete()"
          [disabled]="selectedCount() === 0"
          class="text-xs font-semibold text-red-600 hover:text-red-800 px-3 py-1 rounded-md transition-colors disabled:opacity-50"
        >
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
