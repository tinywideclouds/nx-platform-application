<div class="h-full w-full flex flex-row bg-white overflow-hidden">
  <div
    class="h-full flex flex-col w-72 shrink-0 border-r border-gray-200 bg-gray-50"
  >
    <div
      class="px-2 py-2 flex items-center justify-between border-b border-gray-200 bg-white shrink-0"
    >
      <span
        class="text-xs font-bold text-gray-500 uppercase tracking-wider pl-2"
        >Files</span
      >
      <div class="flex items-center gap-1">
        @if (hasPendingChanges()) {
          <button
            type="button"
            mat-icon-button
            color="primary"
            class="scale-[0.85]"
            matTooltip="Stage All"
            (click)="onStageAll()"
          >
            <mat-icon>checklist</mat-icon>
          </button>
        }
        @if (hasStagedChanges()) {
          <button
            type="button"
            mat-icon-button
            color="warn"
            class="scale-[0.85]"
            matTooltip="Unstage All"
            (click)="onUnstageAll()"
          >
            <mat-icon>remove_done</mat-icon>
          </button>
          <button
            type="button"
            mat-icon-button
            color="accent"
            class="scale-[0.85]"
            matTooltip="View Staged Patch"
            (click)="viewStagedPatch()"
          >
            <mat-icon>integration_instructions</mat-icon>
          </button>
        }
      </div>
    </div>

    <llm-workspace-sidebar
      class="flex-1 overflow-hidden"
      [files]="sidebarFiles()"
      [selectedFilePath]="selectedFilePath()"
      (fileSelected)="onSelectFile($event)"
    />
  </div>

  <div class="flex-1 h-full min-w-0 bg-white">
    <llm-workspace-file-viewer
      class="w-full h-full block"
      [filePath]="selectedFilePath()"
      [isLoading]="activeRecord()?.isContentLoading ?? false"
      [hasBaseContent]="activeRecord()?.baseContent !== null"
      [displayContent]="displayContent()"
      [displayError]="displayError()"
      [healedPatch]="healedPatch()"
      [failedProposalId]="failedProposalId()"
      (healRequested)="onHealProposal($event)"
      [proposalChain]="activeChain()"
      [selectedProposalId]="selectedProposalId()"
      (stageProposal)="onStageProposal($event)"
      (previewSelected)="onPreviewSelected($event)"
      (acceptProposal)="onAcceptProposal($event)"
      (rejectProposal)="onRejectProposal($event)"
    />
  </div>
</div>
