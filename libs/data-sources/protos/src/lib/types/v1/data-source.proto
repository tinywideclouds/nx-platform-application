// Defines the message contract for the Data Sources service.
syntax = "proto3";

package src.types.datasources.v1;
option go_package = "github.com/tinywideclouds/gen-data-sources/go/types/v1;datasources_v1";

message StoreCollectionsPb {
  string targets_collection = 1;
  string files_collection = 2;
  string data_sources_collection = 3;
  string data_groups_collection = 4;
}

// --- Domain Models ---

message FilterRulesPb {
  repeated string include = 1;
  repeated string exclude = 2;
}

// THE STREAM (Formerly ProfilePb)
message DataSourcePb {
  string id = 1;
  string target_id = 2; 
  string name = 3;
  string rules_yaml = 4;
  string created_at = 5;
  string updated_at = 6;
}

message DataSourceAnalysisPb {
  int32 total_files = 1;
  int32 total_size_bytes = 2;
  map<string, int32> extensions = 3;
}

// THE LAKE (Formerly DataSourceMetadataPb)
message IngestionTargetPb {
  string id = 1;
  string type = 2;
  string display_name = 3; 
  string description = 4;  
  string synced_commit_sha = 5;
  int64 last_synced_at = 6;
  int32 file_count = 7;
  string status = 8;
  DataSourceAnalysisPb analysis = 9;
}

message FileMetadataPb {
  string path = 1;
  int32 size_bytes = 2;
  string extension = 3;
}

// THE BLUEPRINT
message DataGroupPb {
  string id = 1;
  string name = 2;
  optional string description = 3;
  repeated string data_source_ids = 4; // Clean array of strings! No more tuples.
  map<string, string> metadata = 5;
  optional string created_at = 6;
  optional string updated_at = 7;
}

// --- API Requests & Responses ---

message CreateIngestionTargetRequestPb {
  string repo = 1;
  string branch = 2;
}

message SyncRequestPb {
  FilterRulesPb ingestion_rules = 1;
}

message SyncResponsePb {
  string target_id = 1;
  string status = 2;
  int32 files_processed = 3;
}

message DataSourceRequestPb {
  string name = 1;
  string rules_yaml = 2;
}

message DataGroupRequestPb {
  string name = 1;
  optional string description = 2;
  repeated string data_source_ids = 3; // Clean array of strings
  map<string, string> metadata = 4;
}