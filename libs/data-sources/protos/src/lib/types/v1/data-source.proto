// Defines the message contract for the Data Sources service.
syntax = "proto3";

package src.types.datasources.v1;
option go_package = "github.com/tinywideclouds/gen-data-sources/go/types/v1;datasources_v1";

message StoreCollectionsPb {
  string bundle_collection = 1;
  string files_collection = 2;
  string profiles_collection = 3;
  string datagroups_collection = 4; // NEW: Added collection for groups
}

// --- Domain Models ---

message FilterRulesPb {
  repeated string include = 1;
  repeated string exclude = 2;
}

message ProfilePb {
  string id = 1;
  string name = 2;
  string rules_yaml = 3;
  string created_at = 4;
  string updated_at = 5;
}

message DataSourceAnalysisPb {
  int32 total_files = 1;
  int32 total_size_bytes = 2;
  map<string, int32> extensions = 3;
}

message DataSourceMetadataPb {
  string id = 1;
  string repo = 2;
  string branch = 3;
  string synced_commit_sha = 4;
  int64 last_synced_at = 5;
  int32 file_count = 6;
  string status = 7;
  DataSourceAnalysisPb analysis = 8;
}

message FileMetadataPb {
  string path = 1;
  int32 size_bytes = 2;
  string extension = 3;
}

// --- NEW: Data Group Models (Context Blueprints) ---

message DataGroupSourcePb {
  string data_source_id = 1;
  optional string profile_id = 2;
}

message DataGroupPb {
  string id = 1;
  string name = 2;
  optional string description = 3;
  repeated DataGroupSourcePb sources = 4;
  map<string, string> metadata = 5; // e.g., for Gemini compiledCacheId and expiry
  optional string created_at = 6;
  optional string updated_at = 7;
}

// --- API Requests & Responses ---

message CreateDataSourceRequestPb {
  string repo = 1;
  string branch = 2;
}

message SyncRequestPb {
  FilterRulesPb ingestion_rules = 1;
}

message SyncResponsePb {
  string cache_id = 1;
  string status = 2;
  int32 files_processed = 3;
}

message ProfileRequestPb {
  string name = 1;
  string rules_yaml = 2;
}

message DataGroupRequestPb {
  string name = 1;
  optional string description = 2;
  repeated DataGroupSourcePb sources = 3;
  map<string, string> metadata = 4;
}