<div class="flex flex-col w-full border-t border-gray-200 bg-white p-3 gap-2">
  @if (attachments().length > 0) {
    <div class="flex flex-wrap gap-2 px-1 animate-fade-in">
      @for (item of attachments(); track item.id) {
        <div class="relative group">
          <img
            [src]="item.previewUrl"
            class="h-16 w-16 object-cover rounded-lg border border-gray-200"
            alt="preview"
          />
          <button
            type="button"
            title="preview"
            (click)="removeAttachment(item.id)"
            class="absolute -top-2 -right-2 bg-gray-800 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-gray-700"
            type="button"
          >
            <svg
              class="w-3 h-3"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
      }
    </div>
  }

  <div class="flex items-end gap-2">
    <ng-content select="[start]"></ng-content>

    <button
      type="button"
      title="select"
      (click)="fileInput.click()"
      class="text-gray-400 hover:text-gray-600 p-2 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-gray-200"
      [disabled]="disabled()"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"
        ></path>
      </svg>
    </button>

    <input
      #fileInput
      title="file input"
      type="file"
      class="hidden"
      (change)="onFileSelected($event)"
      [accept]="config().accept || 'image/*'"
      multiple
    />

    <textarea
      title="input"
      #messageBox
      [value]="text()"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      (paste)="onPaste($event)"
      [placeholder]="config().placeholder || 'Type a message...'"
      [disabled]="disabled()"
      rows="1"
      class="flex-grow resize-none border-0 bg-gray-100 rounded-2xl px-4 py-2.5 focus:ring-2 focus:ring-blue-100 focus:outline-none max-h-32 overflow-y-auto text-sm disabled:opacity-50 disabled:cursor-not-allowed"
    ></textarea>

    <button
      title="send"
      type="button"
      [disabled]="!canSend() || disabled()"
      (click)="triggerSend()"
      class="p-2 rounded-full transition-all duration-200 flex items-center justify-center"
      [class.bg-blue-500]="canSend()"
      [class.text-white]="canSend()"
      [class.hover:bg-blue-600]="canSend()"
      [class.bg-gray-100]="!canSend()"
      [class.text-gray-400]="!canSend()"
    >
      <svg
        class="w-5 h-5 ml-0.5"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
        ></path>
      </svg>
    </button>
  </div>
</div>
